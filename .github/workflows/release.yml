name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install build hatchling

      - name: Build wheel and sdist
        run: python -m build

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"
          # Create the release if it doesn't exist yet; ignore error if it does
          gh release create "$TAG" \
            --title "Hazel $TAG" \
            --generate-notes 2>/dev/null || true
          # Upload (or overwrite) the build artifacts
          gh release upload "$TAG" dist/*.whl dist/*.tar.gz --clobber
